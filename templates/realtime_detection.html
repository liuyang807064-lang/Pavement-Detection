<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时路面检测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主内容区域 */
        .main-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* 视频显示区域 */
        .video-container {
            flex: 1;
            min-width: 600px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .video-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .video-display {
            width: 100%;
            height: 500px;
            background: #000;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #webcam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .video-placeholder {
            text-align: center;
            color: #999;
            z-index: 0;
        }

        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 2;
        }

        #detection-canvas {
            width: 100%;
            height: 100%;
        }

        /* 状态面板 */
        .status-panel {
            width: 300px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .status-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .status-items {
            margin-bottom: 20px;
        }

        .status-item {
            margin-bottom: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .status-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        .status-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .btn-control {
            display: block;
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-control:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-control:active {
            transform: translateY(0);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .video-container {
                min-width: 100%;
            }
            
            .status-panel {
                width: 100%;
            }
            
            .page-title {
                font-size: 1.5rem;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="page-title">实时路面检测系统</h1>

        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 视频显示区域 -->
            <div class="video-container">
                <div class="video-header">摄像头实时画面</div>
                <div class="video-display">
                    <video id="webcam-video" autoplay playsinline></video>
                    <div class="canvas-container">
                        <canvas id="detection-canvas"></canvas>
                    </div>
                    <div class="video-placeholder" id="video-placeholder">
                        <p>📷 点击"开始"按钮启动摄像头</p>
                    </div>
                </div>
            </div>

            <!-- 状态面板 -->
            <div class="status-panel">
                <div class="status-header">运行状态</div>
                <div class="status-items">
                    <div class="status-item">
                        <span class="status-label">· 帧率:</span>
                        <span class="status-value" id="fps-value">32 FPS</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">· 延迟:</span>
                        <span class="status-value" id="delay-value">45ms</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">· 目标数:</span>
                        <span class="status-value" id="targets-value">2</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">· 置信度:</span>
                        <input type="range" id="confidence-slider" min="0" max="100" value="25" style="width: 100%; margin-top: 10px;">
                        <span class="status-value" id="confidence-value" style="font-size: 1rem; margin-top: 5px; display: block; text-align: center;">25%</span>
                    </div>
                </div>
                
                <button class="btn-control" id="start-stop-btn">开始</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script>
        // 等待 DOM 加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 加载完成');
            
            // 强制使用 WebGL 后端
            async function setupWebGL() {
                try {
                    await tf.setBackend('webgl');
                    await tf.ready();
                    console.log('✅ 已强制使用 WebGL 后端');
                    console.log('🚀 当前后端:', tf.getBackend());
                    
                    // 启用 WebGL 优化
                    tf.env().set('WEBGL_FORCE_F16_TEXTURES', true);
                    tf.env().set('WEBGL_PACK', true);
                    tf.env().set('WEBGL_SIZE_UPLOAD_UNIFORM', 0);
                } catch (error) {
                    console.warn('❌ WebGL 设置失败，使用默认后端:', error);
                }
            }
            
            setupWebGL();
            
            // 摄像头和检测相关变量
            let videoStream = null;
            let isRunning = false;
            let animationFrameId = null;
            let model = null;
            let detectionInterval = null;
            const videoElement = document.getElementById('webcam-video');
            const canvasElement = document.getElementById('detection-canvas');
            const canvasContainer = document.querySelector('.canvas-container');
            const placeholderElement = document.getElementById('video-placeholder');
            const startStopBtn = document.getElementById('start-stop-btn');
            
            // 状态变量
            let fpsValue = 0;
            let delayValue = 0;
            let targetsValue = 0;
            let confidenceThreshold = 0.25; // 默认置信度阈值
            let lastTime = performance.now();
            let frameCount = 0;
            
            // 跳帧检测配置（每 3 帧检测一次）
            const frameSkip = 2; // 跳过 2 帧，第 3 帧检测
            let currentFrameIndex = 0;
            
            // 时间平滑相关变量
            let previousDetections = [];
            const smoothingFactor = 0.3; // 平滑系数，0.3 表示新帧占 30%，历史帧占 70%
            
            // 类别名称（从 metadata.yaml 获取）
            const classNames = [
                'Alligator Crack',      // 0
                'Longitudinal Crack',    // 1
                'Longitudinal Patch',    // 2
                'Manhole Cover',         // 3
                'Pothole',              // 4
                'Transverse Crack',      // 5
                'Transverse Patch'       // 6
            ];
            
            // 检测框颜色
            const boxColors = [
                '#FF0000', // 红色
                '#00FF00', // 绿色
                '#0000FF', // 蓝色
                '#FFFF00', // 黄色
                '#FF00FF', // 品红
                '#00FFFF', // 青色
                '#FFA500'  // 橙色
            ];
            
            // 检查按钮是否存在
            if (!startStopBtn) {
                console.error('按钮元素未找到');
                return;
            }
            
            console.log('按钮元素已找到');
            
            // 加载 YOLO 模型
            async function loadModel() {
                console.log('开始加载模型...');
                try {
                    model = await tf.loadGraphModel('/models/model.json');
                    console.log('模型加载成功');
                    console.log('模型输入形状:', model.inputs);
                    return true;
                } catch (error) {
                    console.error('模型加载失败:', error);
                    alert('模型加载失败：' + error.message);
                    return false;
                }
            }
            
            // 预处理图像
            function preprocessImage(image, inputSize = 640) {
                return tf.tidy(() => {
                    let tensor = tf.browser.fromPixels(image);
                    
                    // 调整大小到模型输入尺寸
                    tensor = tf.image.resizeBilinear(tensor, [inputSize, inputSize]);
                    
                    // 归一化到 [0, 1]
                    tensor = tensor.toFloat().div(tf.scalar(255.0));
                    
                    // 添加 batch 维度
                    tensor = tensor.expandDims(0);
                    
                    return tensor;
                });
            }
            
            // 后处理：解析模型输出 + NMS
            function postprocess(output, confidenceThreshold = 0.5) {
                return tf.tidy(() => {
                    // YOLOv11 输出格式：[1, 84, 8400]
                    // 需要转置为 [1, 8400, 84]
                    
                    console.log('模型输出形状:', output.shape);
                    console.log('模型输出类型:', typeof output);
                    
                    // 转置：[1, 84, 8400] -> [1, 8400, 84]
                    const transposed = output.transpose([0, 2, 1]);
                    console.log('转置后形状:', transposed.shape);
                    
                    const outputArray = transposed.arraySync()[0];
                    console.log('检测数量:', outputArray.length);
                    
                    const boxes = [];
                    const scores = [];
                    const classes = [];
                    
                    outputArray.forEach((detection, idx) => {
                        // 前 4 个是边界框坐标 [x1, y1, x2, y2]
                        // YOLOv11 输出的是像素值（相对于 640x640 输入）
                        const x1 = detection[0];
                        const y1 = detection[1];
                        const x2 = detection[2];
                        const y2 = detection[3];
                        
                        // 后面是类别置信度 (7 类)
                        const classScores = detection.slice(4);
                        const maxScore = Math.max(...classScores);
                        const classId = classScores.indexOf(maxScore);
                        
                        if (maxScore > confidenceThreshold) {
                            boxes.push([x1 / 640, y1 / 640, x2 / 640, y2 / 640]);
                            scores.push(maxScore);
                            classes.push(classId);
                        }
                    });
                    
                    console.log('过滤后检测到', boxes.length, '个目标');
                    
                    if (boxes.length === 0) {
                        return [];
                    }
                    
                    // 应用 NMS（非极大值抑制）
                    const iouThreshold = 0.3; // 降低 IoU 阈值，更严格去重
                    const selectedIndices = tf.image.nonMaxSuppression(
                        boxes,
                        scores,
                        100, // 最大检测数
                        iouThreshold,
                        0 // 分数阈值
                    );
                    
                    const selectedData = selectedIndices.arraySync();
                    console.log('NMS 后保留', selectedData.length, '个目标');
                    
                    const detections = [];
                    selectedData.forEach(idx => {
                        detections.push({
                            bbox: boxes[idx],
                            classId: classes[idx],
                            confidence: scores[idx]
                        });
                    });
                    
                    selectedIndices.dispose();
                    
                    if (detections.length > 0) {
                        console.log('第一个目标的 bbox:', detections[0].bbox);
                    }
                    return detections;
                });
            }
            
            // 应用时间平滑
            function applySmoothing(currentDetections, previousDetections, factor) {
                if (previousDetections.length === 0) {
                    return currentDetections;
                }
                
                const smoothed = [];
                
                currentDetections.forEach(current => {
                    // 在之前的检测中找最接近的
                    let bestMatch = null;
                    let bestIoU = 0;
                    
                    previousDetections.forEach(prev => {
                        const iou = calculateIoU(current.bbox, prev.bbox);
                        if (iou > bestIoU && iou > 0.3) {
                            bestIoU = iou;
                            bestMatch = prev;
                        }
                    });
                    
                    if (bestMatch) {
                        // 平滑边界框
                        const [x1, y1, x2, y2] = current.bbox;
                        const [px1, py1, px2, py2] = bestMatch.bbox;
                        
                        const smoothX1 = factor * x1 + (1 - factor) * px1;
                        const smoothY1 = factor * y1 + (1 - factor) * py1;
                        const smoothX2 = factor * x2 + (1 - factor) * px2;
                        const smoothY2 = factor * y2 + (1 - factor) * py2;
                        
                        smoothed.push({
                            bbox: [smoothX1, smoothY1, smoothX2, smoothY2],
                            classId: current.classId,
                            confidence: factor * current.confidence + (1 - factor) * bestMatch.confidence
                        });
                    } else {
                        smoothed.push(current);
                    }
                });
                
                return smoothed;
            }
            
            // 计算 IoU
            function calculateIoU(box1, box2) {
                const [x1_1, y1_1, x2_1, y2_1] = box1;
                const [x1_2, y1_2, x2_2, y2_2] = box2;
                
                const xi1 = Math.max(x1_1, x1_2);
                const yi1 = Math.max(y1_1, y1_2);
                const xi2 = Math.min(x2_1, x2_2);
                const yi2 = Math.min(y2_1, y2_2);
                
                const interArea = Math.max(0, xi2 - xi1) * Math.max(0, yi2 - yi1);
                
                const box1Area = (x2_1 - x1_1) * (y2_1 - y1_1);
                const box2Area = (x2_2 - x1_2) * (y2_2 - y1_2);
                
                const unionArea = box1Area + box2Area - interArea;
                
                return unionArea > 0 ? interArea / unionArea : 0;
            }
            function drawDetections(detections, canvas, videoWidth, videoHeight) {
                const ctx = canvas.getContext('2d');
                
                console.log('绘制检测框，数量:', detections.length);
                console.log('Canvas 尺寸:', canvas.width, 'x', canvas.height);
                console.log('视频尺寸:', videoWidth, 'x', videoHeight);
                
                // 清除之前的检测框
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 重新绘制视频帧
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                
                if (detections.length === 0) {
                    console.log('未检测到任何目标');
                    return;
                }
                
                detections.forEach((detection, index) => {
                    const [x1, y1, x2, y2] = detection.bbox;
                    
                    console.log(`目标 ${index}:`, {
                        bbox: [x1, y1, x2, y2],
                        classId: detection.classId,
                        confidence: detection.confidence
                    });
                    
                    // 直接使用 canvas 尺寸进行缩放
                    // bbox 坐标已经是 0-1 归一化的，直接乘以 canvas 尺寸
                    const drawX1 = x1 * canvas.width;
                    const drawY1 = y1 * canvas.height;
                    const drawX2 = x2 * canvas.width;
                    const drawY2 = y2 * canvas.height;
                    
                    const width = drawX2 - drawX1;
                    const height = drawY2 - drawY1;
                    
                    console.log(`目标 ${index} 绘制坐标:`, drawX1, drawY1, drawX2, drawY2, width, height);
                    
                    // 绘制边界框
                    const color = boxColors[detection.classId % boxColors.length];
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(drawX1, drawY1, width, height);
                    
                    // 绘制标签背景
                    const label = `${classNames[detection.classId]}: ${(detection.confidence * 100).toFixed(1)}%`;
                    ctx.font = 'bold 14px Arial';
                    const textWidth = ctx.measureText(label).width;
                    ctx.fillStyle = color;
                    ctx.fillRect(drawX1, drawY1 - 22, textWidth + 10, 22);
                    
                    // 绘制标签文字
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillText(label, drawX1 + 5, drawY1 - 6);
                    
                    console.log(`目标 ${index} 绘制完成`);
                });
                
                console.log('所有检测框绘制完成');
            }
            
            // 执行检测
            async function detectFrame() {
                if (!model || !videoStream) return;
                
                const startTime = performance.now();
                
                try {
                    // 预处理
                    const inputTensor = preprocessImage(videoElement);
                    console.log('输入张量形状:', inputTensor.shape);
                    
                    // 模型推理
                    const output = model.predict(inputTensor);
                    console.log('输出张量形状:', output.shape);
                    console.log('输出张量数据类型:', output.dtype);
                    
                    // 输出一部分数据看看
                    const outputData = output.dataSync();
                    console.log('输出数据前 10 个值:', Array.from(outputData.slice(0, 10)));
                    console.log('输出数据是否有 NaN:', outputData.some(v => isNaN(v)));
                    console.log('输出数据最大值:', Math.max(...outputData));
                    console.log('输出数据最小值:', Math.min(...outputData));
                    
                    // 后处理 - 使用滑块设置的置信度
                    const detections = postprocess(output, confidenceThreshold);
                    
                    // 应用时间平滑
                    const smoothedDetections = applySmoothing(detections, previousDetections, smoothingFactor);
                    previousDetections = smoothedDetections;
                    
                    console.log('最终检测结果:', smoothedDetections.length, '个目标');
                    
                    // 绘制检测结果
                    drawDetections(smoothedDetections, canvasElement, videoElement.videoWidth, videoElement.videoHeight);
                    
                    // 更新目标数
                    targetsValue = detections.length;
                    
                    // 计算延迟
                    delayValue = Math.round(performance.now() - startTime);
                    
                    // 清理张量
                    inputTensor.dispose();
                    output.dispose();
                    
                } catch (error) {
                    console.error('检测失败:', error);
                }
            }
            function checkCameraSupport() {
                const support = {
                    mediaDevices: !!navigator.mediaDevices,
                    getUserMedia: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
                    webkitGetUserMedia: !!navigator.webkitGetUserMedia,
                    mozGetUserMedia: !!navigator.mozGetUserMedia,
                    msGetUserMedia: !!navigator.msGetUserMedia
                };
                
                console.log('浏览器摄像头支持情况:', support);
                
                // 如果完全不支持，显示警告
                if (!support.getUserMedia && !support.webkitGetUserMedia && 
                    !support.mozGetUserMedia && !support.msGetUserMedia) {
                    console.warn('⚠️ 浏览器完全不支持摄像头 API');
                    alert('⚠️ 您的浏览器不支持摄像头功能！\n\n这可能是因为：\n1. 浏览器版本过旧\n2. 某些手机浏览器（如某些国产浏览器）不支持\n3. 需要通过 HTTPS 访问\n\n建议：\n- 使用最新版 Chrome 浏览器\n- 在电脑上测试\n- 使用 HTTPS 访问');
                }
                
                return support;
            }
            
            // 页面加载时检测
            const cameraSupport = checkCameraSupport();
            console.log('摄像头支持检测结果:', cameraSupport);
            
            // 置信度滑块事件监听
            const confidenceSlider = document.getElementById('confidence-slider');
            const confidenceValue = document.getElementById('confidence-value');
            
            confidenceSlider.addEventListener('input', function() {
                confidenceThreshold = this.value / 100;
                confidenceValue.textContent = this.value + '%';
                console.log('置信度阈值已更新:', confidenceThreshold);
            });
            
            // 启动摄像头
            async function startWebcam() {
                console.log('开始启动摄像头函数');
                console.log('navigator.mediaDevices:', navigator.mediaDevices);
                console.log('navigator.getUserMedia:', navigator.getUserMedia);
                console.log('navigator.webkitGetUserMedia:', navigator.webkitGetUserMedia);
                console.log('navigator.mozGetUserMedia:', navigator.mozGetUserMedia);
                
                // 尝试所有可能的 API
                let getUserMedia = null;
                
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    console.log('使用标准 API: navigator.mediaDevices.getUserMedia');
                    getUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
                } else if (navigator.getUserMedia) {
                    console.log('使用标准旧 API: navigator.getUserMedia');
                    getUserMedia = navigator.getUserMedia.bind(navigator);
                } else if (navigator.webkitGetUserMedia) {
                    console.log('使用 WebKit API: navigator.webkitGetUserMedia');
                    getUserMedia = navigator.webkitGetUserMedia.bind(navigator);
                } else if (navigator.mozGetUserMedia) {
                    console.log('使用 Mozilla API: navigator.mozGetUserMedia');
                    getUserMedia = navigator.mozGetUserMedia.bind(navigator);
                } else if (navigator.msGetUserMedia) {
                    console.log('使用 Microsoft API: navigator.msGetUserMedia');
                    getUserMedia = navigator.msGetUserMedia.bind(navigator);
                }
                
                if (!getUserMedia) {
                    const errorMsg = '您的浏览器不支持摄像头访问功能\n\n当前支持的 API:\n- mediaDevices: ' + 
                                    !!navigator.mediaDevices + 
                                    '\n- getUserMedia: ' + !!navigator.getUserMedia +
                                    '\n- webkitGetUserMedia: ' + !!navigator.webkitGetUserMedia +
                                    '\n- mozGetUserMedia: ' + !!navigator.mozGetUserMedia;
                    console.error(errorMsg);
                    throw new Error('您的浏览器不支持摄像头访问功能');
                }
                
                const constraints = {
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'environment'
                    },
                    audio: false
                };
                
                console.log('请求参数:', constraints);
                
                try {
                    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                        console.log('调用 Promise 版本 API');
                        const stream = await getUserMedia(constraints);
                        videoStream = stream;
                        videoElement.srcObject = stream;
                        
                        return new Promise((resolve) => {
                            videoElement.onloadedmetadata = () => {
                                console.log('视频元数据加载完成');
                                videoElement.play();
                                resolve();
                            };
                        });
                    } else {
                        console.log('调用回调版本 API');
                        return new Promise((resolve, reject) => {
                            getUserMedia(constraints, (stream) => {
                                console.log('回调版本 API 成功');
                                videoStream = stream;
                                videoElement.srcObject = stream;
                                
                                videoElement.onloadedmetadata = () => {
                                    videoElement.play();
                                    resolve();
                                };
                            }, (error) => {
                                console.error('回调版本 API 失败:', error);
                                reject(error);
                            });
                        });
                    }
                } catch (error) {
                    console.error('摄像头访问失败:', error);
                    let errorMsg = error.name + ': ' + error.message;
                    
                    if (error.name === 'NotAllowedError') {
                        errorMsg = '您拒绝了摄像头访问权限\n\n请在浏览器设置中允许访问摄像头';
                    } else if (error.name === 'NotFoundError') {
                        errorMsg = '未找到摄像头设备';
                    } else if (error.name === 'NotReadableError') {
                        errorMsg = '摄像头可能被其他程序占用';
                    } else if (error.name === 'NotSupportedError') {
                        errorMsg = '您的浏览器不支持摄像头功能\n\n请尝试使用 Chrome 或 Edge 浏览器';
                    }
                    
                    alert('无法访问摄像头：' + errorMsg + '\n\n请确保:\n1. 已连接摄像头\n2. 已授予浏览器摄像头权限\n3. 没有其他程序占用摄像头\n4. 使用 HTTPS 或 localhost 访问');
                    throw error;
                }
            }
            
            // 停止摄像头
            function stopWebcam() {
                if (videoStream) {
                    videoStream.getTracks().forEach(track => track.stop());
                    videoStream = null;
                }
                videoElement.srcObject = null;
            }
            
            // 绘制视频帧到 canvas（带检测）- 跳帧优化版
            function drawFrame() {
                if (!isRunning || !videoStream) return;
                
                // 绘制视频帧
                const context = canvasElement.getContext('2d');
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                
                // 计算 FPS
                const currentTime = performance.now();
                frameCount++;
                if (currentTime - lastTime >= 1000) {
                    fpsValue = frameCount;
                    frameCount = 0;
                    lastTime = currentTime;
                    
                    // 更新状态显示
                    updateStatusDisplay();
                }
                
                // 跳帧检测逻辑：每 3 帧检测一次
                if (model && currentFrameIndex % (frameSkip + 1) === 0) {
                    detectFrame();
                    console.log(`🎯 [帧${currentFrameIndex}] 执行检测`);
                } else if (model) {
                    // 不检测的帧，继续绘制上一帧的检测框（避免闪烁）
                    if (previousDetections.length > 0) {
                        drawDetections(previousDetections, canvasElement, videoElement.videoWidth, videoElement.videoHeight);
                        console.log(`⏭️ [帧${currentFrameIndex}] 使用缓存检测框 (${previousDetections.length}个)`);
                    } else {
                        console.log(`⏭️ [帧${currentFrameIndex}] 跳过检测（无缓存）`);
                    }
                }
                
                currentFrameIndex++;
                
                // 继续下一帧
                animationFrameId = requestAnimationFrame(drawFrame);
            }
            
            // 更新状态显示
            function updateStatusDisplay() {
                document.getElementById('fps-value').textContent = fpsValue + ' FPS';
                document.getElementById('delay-value').textContent = delayValue + 'ms';
                document.getElementById('targets-value').textContent = targetsValue;
            }
            
            // 按钮点击事件处理
            startStopBtn.addEventListener('click', async function() {
                console.log('按钮被点击，当前状态:', isRunning);
                
                if (!isRunning) {
                    // 启动摄像头和检测
                    try {
                        console.log('开始启动摄像头...');
                        this.textContent = '启动中...';
                        this.disabled = true;
                        
                        // 先加载模型
                        if (!model) {
                            console.log('正在加载模型...');
                            this.textContent = '加载模型中...';
                            const loaded = await loadModel();
                            if (!loaded) {
                                throw new Error('模型加载失败');
                            }
                        }
                        
                        await startWebcam();
                        
                        console.log('摄像头启动成功');
                        // 显示视频和 canvas
                        videoElement.style.display = 'block';
                        canvasContainer.style.display = 'block';
                        placeholderElement.style.display = 'none';
                        
                        isRunning = true;
                        this.textContent = '停止';
                        this.style.background = '#f44336';
                        this.disabled = false;
                        
                        console.log('开始绘制视频帧并检测');
                        // 开始绘制视频帧并检测
                        drawFrame();
                        
                    } catch (error) {
                        console.error('启动失败:', error);
                        alert('启动失败：' + error.message);
                        this.textContent = '开始';
                        this.style.background = '#667eea';
                        this.disabled = false;
                    }
                } else {
                    console.log('停止摄像头...');
                    // 停止检测
                    isRunning = false;
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                    
                    stopWebcam();
                    
                    // 隐藏视频和 canvas，显示占位符
                    videoElement.style.display = 'none';
                    canvasContainer.style.display = 'none';
                    placeholderElement.style.display = 'block';
                    
                    this.textContent = '开始';
                    this.style.background = '#667eea';
                    
                    // 重置状态
                    fpsValue = 0;
                    targetsValue = 0;
                    currentFrameIndex = 0; // 重置帧计数器
                    updateStatusDisplay();
                }
            });
            
            console.log('事件监听器已绑定');
        });
    </script>
</body>
</html>
