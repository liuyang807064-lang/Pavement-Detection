<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上报数据审核管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 1rem;
        }

        .stat-card.total .stat-number { color: #667eea; }
        .stat-card.pending .stat-number { color: #FF9800; }
        .stat-card.approved .stat-number { color: #4CAF50; }
        .stat-card.rejected .stat-number { color: #f44336; }

        .data-table-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .table-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .filter-controls {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-btn.all { background: #667eea; color: white; }
        .filter-btn.pending { background: #FF9800; color: white; }
        .filter-btn.approved { background: #4CAF50; color: white; }
        
        .filter-btn.active {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f9f9f9;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            font-weight: 600;
            color: #555;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-pending {
            background: #FFF3E0;
            color: #EF6C00;
        }

        .status-approved {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .status-rejected {
            background: #FFEBEE;
            color: #C62828;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-approve {
            background: #4CAF50;
            color: white;
        }

        .btn-reject {
            background: #f44336;
            color: white;
        }

        .btn-view {
            background: #2196F3;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .risk-type-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .risk-level-low { color: #4CAF50; }
        .risk-level-medium { color: #FF9800; }
        .risk-level-high { color: #f44336; }

        @media (max-width: 768px) {
            table {
                font-size: 0.85rem;
            }
            
            th, td {
                padding: 8px 4px;
            }
            
            .action-btns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">📋 上报数据审核管理</h1>

        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stat-card total">
                <div class="stat-number" id="total-count">0</div>
                <div class="stat-label">总上报数</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-number" id="pending-count">0</div>
                <div class="stat-label">待审核</div>
            </div>
            <div class="stat-card approved">
                <div class="stat-number" id="approved-count">0</div>
                <div class="stat-label">已通过</div>
            </div>
            <div class="stat-card rejected">
                <div class="stat-number" id="rejected-count">0</div>
                <div class="stat-label">已拒绝</div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-table-container">
            <div class="table-header">
                <h2 class="table-title">📝 上报记录列表</h2>
                <div class="filter-controls">
                    <button class="filter-btn all active" onclick="filterData('all')">全部</button>
                    <button class="filter-btn pending" onclick="filterData('pending')">待审核</button>
                    <button class="filter-btn approved" onclick="filterData('approved')">已通过</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>风险类型</th>
                        <th>风险等级</th>
                        <th>位置坐标</th>
                        <th>描述</th>
                        <th>联系方式</th>
                        <th>上报时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                    <!-- 数据将通过 JavaScript 动态加载 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];
        let currentFilter = 'all';

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('/api/report/history');
                const result = await response.json();
                
                if (result.success) {
                    allData = result.data;
                    updateStats(allData);
                    renderTable(allData);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 更新统计数据
        function updateStats(data) {
            const total = data.length;
            const pending = data.filter(item => !item.is_submitted).length;
            const approved = data.filter(item => item.is_submitted === 1).length;
            const rejected = data.filter(item => item.is_submitted === -1).length;

            document.getElementById('total-count').textContent = total;
            document.getElementById('pending-count').textContent = pending;
            document.getElementById('approved-count').textContent = approved;
            document.getElementById('rejected-count').textContent = rejected;
        }

        // 过滤数据
        function filterData(filterType) {
            currentFilter = filterType;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.filter-btn.${filterType}`).classList.add('active');

            // 过滤数据
            let filteredData = allData;
            if (filterType === 'pending') {
                filteredData = allData.filter(item => !item.is_submitted);
            } else if (filterType === 'approved') {
                filteredData = allData.filter(item => item.is_submitted === 1);
            } else if (filterType === 'rejected') {
                filteredData = allData.filter(item => item.is_submitted === -1);
            }

            renderTable(filteredData);
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('data-table-body');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td><span class="risk-type-badge">${getRiskTypeLabel(item.risk_type)}</span></td>
                    <td>
                        <span class="risk-level-${item.risk_level || 'medium'}">
                            ${getRiskLevelLabel(item.risk_level)}
                        </span>
                    </td>
                    <td>
                        ${parseFloat(item.latitude).toFixed(4)}, ${parseFloat(item.longitude).toFixed(4)}
                    </td>
                    <td>${item.description || '-'}</td>
                    <td>${item.contact || '-'}</td>
                    <td>${formatTime(item.detection_time)}</td>
                    <td>
                        <span class="status-badge status-${getStatusClass(item.is_submitted)}">
                            ${getStatusText(item.is_submitted)}
                        </span>
                    </td>
                    <td>
                        <div class="action-btns">
                            ${!item.is_submitted ? `
                                <button class="btn btn-approve" onclick="approveReport(${item.id})">✓ 通过</button>
                                <button class="btn btn-reject" onclick="rejectReport(${item.id})">✗ 拒绝</button>
                            ` : ''}
                            <button class="btn btn-view" onclick="viewDetail(${item.id})">👁 查看</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 通过审核
        async function approveReport(id) {
            if (!confirm('确认通过这条上报记录？')) return;

            try {
                const response = await fetch(`/api/report/approve/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'approve' })
                });

                const result = await response.json();
                if (result.success) {
                    alert('已通过审核');
                    loadData(); // 重新加载数据
                } else {
                    alert('操作失败：' + result.message);
                }
            } catch (error) {
                console.error('审核失败:', error);
                alert('网络错误，请稍后重试');
            }
        }

        // 拒绝审核
        async function rejectReport(id) {
            if (!confirm('确认拒绝这条上报记录？')) return;

            try {
                const response = await fetch(`/api/report/approve/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'reject' })
                });

                const result = await response.json();
                if (result.success) {
                    alert('已拒绝');
                    loadData(); // 重新加载数据
                } else {
                    alert('操作失败：' + result.message);
                }
            } catch (error) {
                console.error('审核失败:', error);
                alert('网络错误，请稍后重试');
            }
        }

        // 查看详情
        function viewDetail(id) {
            const item = allData.find(r => r.id === id);
            if (item) {
                alert(`详细信息：\n\n` +
                      `ID: ${item.id}\n` +
                      `风险类型：${item.risk_type}\n` +
                      `风险等级：${item.risk_level}\n` +
                      `坐标：${item.latitude}, ${item.longitude}\n` +
                      `描述：${item.description || '无'}\n` +
                      `联系方式：${item.contact || '无'}\n` +
                      `状态：${getStatusText(item.is_submitted)}\n` +
                      `时间：${item.detection_time}`);
            }
        }

        // 辅助函数
        function getRiskTypeLabel(type) {
            const labels = {
                'Pothole': '坑洼',
                'Longitudinal Crack': '纵向裂缝',
                'Transverse Crack': '横向裂缝',
                'Alligator Crack': '网状裂缝',
                'Longitudinal Patch': '纵向补丁',
                'Transverse Patch': '横向补丁',
                'Manhole Cover': '井盖',
                'Other': '其他'
            };
            return labels[type] || type;
        }

        function getRiskLevelLabel(level) {
            const labels = {
                'low': '低',
                'medium': '中',
                'high': '高'
            };
            return labels[level] || '中';
        }

        function getStatusClass(isSubmitted) {
            if (isSubmitted === 1) return 'approved';
            if (isSubmitted === -1) return 'rejected';
            return 'pending';
        }

        function getStatusText(isSubmitted) {
            if (isSubmitted === 1) return '✅ 已通过';
            if (isSubmitted === -1) return '❌ 已拒绝';
            return '⏳ 待审核';
        }

        function formatTime(timeStr) {
            if (!timeStr) return '未知';
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
    </script>
</body>
</html>
