<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史数据统计分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 关键指标卡片 */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        /* 图表区域 */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .chart-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .chart {
            width: 100%;
            height: 350px;
        }

        /* 数据表格 */
        .data-table-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .btn-export {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-export:hover {
            background: #5a6fd8;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        .risk-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.2rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8rem;
            }

            .stats-cards {
                grid-template-columns: 1fr;
            }

            .charts-container {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="page-title">📊 历史数据统计分析</h1>

        <!-- 关键指标卡片 -->
        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-label">总检测数</div>
                <div class="stat-value" id="total-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-label">风险类型</div>
                <div class="stat-value" id="type-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-label">最近 7 天</div>
                <div class="stat-value" id="week-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-label">平均每天</div>
                <div class="stat-value" id="daily-avg">-</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-container">
            <!-- 病害分布柱状图 -->
            <div class="chart-box">
                <div class="chart-title">🔍 病害分布柱状图</div>
                <div id="bar-chart" class="chart"></div>
            </div>

            <!-- 风险趋势折线图 -->
            <div class="chart-box">
                <div class="chart-title">📉 风险趋势折线图</div>
                <div id="line-chart" class="chart"></div>
            </div>

            <!-- 风险类型占比饼图 -->
            <div class="chart-box">
                <div class="chart-title">🥧 风险类型占比饼图</div>
                <div id="pie-chart" class="chart"></div>
            </div>

            <!-- 雷达图 -->
            <div class="chart-box">
                <div class="chart-title">🎲 风险等级雷达图</div>
                <div id="radar-chart" class="chart"></div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-table-section">
            <div class="table-header">
                <div class="table-title">📋 最近检测记录</div>
                <button class="btn-export" onclick="exportToCSV()">导出 CSV</button>
            </div>
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>检测时间</th>
                            <th>风险类型</th>
                            <th>纬度</th>
                            <th>经度</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="5" class="loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 风险类型颜色映射
        const riskTypeColors = {
            'Alligator Crack': '#FF6B6B',
            'Longitudinal Crack': '#FFA500',
            'Longitudinal Patch': '#FFD700',
            'Manhole Cover': '#4169E1',
            'Pothole': '#FF0000',
            'Transverse Crack': '#FF8C00',
            'Transverse Patch': '#DAA520'
        };

        const riskTypeNames = {
            'Alligator Crack': '网状裂痕',
            'Longitudinal Crack': '纵向裂痕',
            'Longitudinal Patch': '纵向修补',
            'Manhole Cover': '井盖',
            'Pothole': '坑洼',
            'Transverse Crack': '横向裂缝',
            'Transverse Patch': '横向修补'
        };

        // 存储所有图表实例
        let charts = {};

        // 初始化所有图表
        function initCharts() {
            charts.bar = echarts.init(document.getElementById('bar-chart'));
            charts.line = echarts.init(document.getElementById('line-chart'));
            charts.pie = echarts.init(document.getElementById('pie-chart'));
            charts.radar = echarts.init(document.getElementById('radar-chart'));
        }

        // 加载统计数据
        async function loadStatistics() {
            try {
                const response = await fetch('/api/statistics/summary');
                const result = await response.json();
                
                if (result.success) {
                    updateStatsCards(result.data);
                    updateBarChart(result.data.type_stats);
                    updateLineChart(result.data.daily_stats);
                    updatePieChart(result.data.type_stats);
                    updateRadarChart(result.data.type_stats);
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载最近记录
        async function loadRecentRecords() {
            try {
                const response = await fetch('/api/statistics/recent');
                const result = await response.json();
                
                if (result.success) {
                    updateTable(result.data);
                }
            } catch (error) {
                console.error('加载最近记录失败:', error);
            }
        }

        // 更新统计卡片
        function updateStatsCards(data) {
            document.getElementById('total-count').textContent = data.total;
            document.getElementById('type-count').textContent = data.type_stats.length;
            
            const weekTotal = data.daily_stats.reduce((sum, item) => sum + item.count, 0);
            document.getElementById('week-count').textContent = weekTotal;
            
            const dailyAvg = weekTotal > 0 ? (weekTotal / 7).toFixed(1) : 0;
            document.getElementById('daily-avg').textContent = dailyAvg;
        }

        // 更新柱状图
        function updateBarChart(typeStats) {
            const types = typeStats.map(item => riskTypeNames[item.risk_type] || item.risk_type);
            const counts = typeStats.map(item => item.count);
            const colors = typeStats.map(item => riskTypeColors[item.risk_type] || '#667eea');

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: types,
                    axisLabel: {
                        rotate: 30,
                        interval: 0
                    }
                },
                yAxis: {
                    type: 'value'
                },
                series: [{
                    data: counts,
                    type: 'bar',
                    itemStyle: {
                        color: function(params) {
                            return colors[params.dataIndex];
                        }
                    },
                    label: {
                        show: true,
                        position: 'top'
                    }
                }]
            };

            charts.bar.setOption(option);
        }

        // 更新折线图
        function updateLineChart(dailyStats) {
            const dates = dailyStats.map(item => item.date);
            const counts = dailyStats.map(item => item.count);

            const option = {
                tooltip: {
                    trigger: 'axis'
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: dates
                },
                yAxis: {
                    type: 'value'
                },
                series: [{
                    data: counts,
                    type: 'line',
                    smooth: true,
                    areaStyle: {
                        opacity: 0.3
                    },
                    itemStyle: {
                        color: '#667eea'
                    },
                    label: {
                        show: true,
                        position: 'top'
                    }
                }]
            };

            charts.line.setOption(option);
        }

        // 更新饼图
        function updatePieChart(typeStats) {
            const data = typeStats.map(item => ({
                name: riskTypeNames[item.risk_type] || item.risk_type,
                value: item.count,
                itemStyle: {
                    color: riskTypeColors[item.risk_type] || '#667eea'
                }
            }));

            const option = {
                tooltip: {
                    trigger: 'item'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left'
                },
                series: [{
                    type: 'pie',
                    radius: '50%',
                    data: data,
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    },
                    label: {
                        formatter: '{b}: {c} ({d}%)'
                    }
                }]
            };

            charts.pie.setOption(option);
        }

        // 更新雷达图
        function updateRadarChart(typeStats) {
            const maxCount = Math.max(...typeStats.map(item => item.count), 1);
            
            const indicator = typeStats.map(item => ({
                name: riskTypeNames[item.risk_type] || item.risk_type,
                max: maxCount
            }));

            const data = typeStats.map(item => item.count);

            const option = {
                tooltip: {},
                radar: {
                    indicator: indicator,
                    radius: '65%'
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: data,
                        name: '风险分布'
                    }],
                    areaStyle: {
                        color: 'rgba(102, 126, 234, 0.5)'
                    },
                    lineStyle: {
                        color: '#667eea'
                    },
                    itemStyle: {
                        color: '#667eea'
                    }
                }]
            };

            charts.radar.setOption(option);
        }

        // 更新数据表格
        function updateTable(records) {
            const tbody = document.getElementById('table-body');
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">暂无数据</td></tr>';
                return;
            }

            let html = '';
            records.forEach(record => {
                const typeName = riskTypeNames[record.risk_type] || record.risk_type;
                const color = riskTypeColors[record.risk_type] || '#667eea';
                
                html += `
                    <tr>
                        <td>${record.id}</td>
                        <td>${record.detection_time}</td>
                        <td>
                            <span class="risk-type-badge" style="background: ${color}; color: white;">
                                ${typeName}
                            </span>
                        </td>
                        <td>${record.latitude.toFixed(6)}</td>
                        <td>${record.longitude.toFixed(6)}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // 导出 CSV
        function exportToCSV() {
            fetch('/api/statistics/recent')
                .then(response => response.json())
                .then(result => {
                    if (!result.success) return;

                    let csv = 'ID，检测时间，风险类型，纬度，经度\n';
                    result.data.forEach(record => {
                        const typeName = riskTypeNames[record.risk_type] || record.risk_type;
                        csv += `${record.id},${record.detection_time},${typeName},${record.latitude},${record.longitude}\n`;
                    });

                    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `风险检测数据_${new Date().toLocaleDateString()}.csv`;
                    link.click();
                })
                .catch(error => console.error('导出失败:', error));
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadStatistics();
            loadRecentRecords();

            // 窗口大小改变时重新渲染图表
            window.addEventListener('resize', function() {
                Object.values(charts).forEach(chart => chart.resize());
            });
        });
    </script>
</body>
</html>
